<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kam Do Cafe · 金都茶室 — Authentic Hong Kong Cha Chaan Teng</title>
  <meta name="description" content="Authentic Hong Kong cha chaan teng in Richmond, BC. Classic comfort food made fresh daily — from satay beef noodles to golden pineapple buns.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="#" class="nav__brand">
        <div class="nav__logo">金都</div>
        <div>
          <div class="nav__name">Kam Do Cafe</div>
          <div class="nav__subtitle">Hong Kong Style</div>
        </div>
      </a>

      <button class="nav__mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <ul class="nav__links" id="nav-links">
        <!-- Populated by JS -->
      </ul>

      <button class="nav__cart-btn" id="cart-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Cart
        <span class="nav__cart-count" id="cart-count" data-count="0"></span>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero" id="hero">
    <!-- Populated by JS from menu.json -->
  </header>

  <!-- Menu Sections -->
  <main id="menu-container">
    <!-- Populated by JS from menu.json -->
  </main>

  <!-- Specials -->
  <div class="specials" id="specials-container">
    <!-- Populated by JS from menu.json -->
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer__inner" id="footer-info">
      <!-- Populated by JS from menu.json -->
    </div>
    <div class="footer__bottom">
      Kam Do Cafe · 金都茶室 · Photos are for reference only · Prices (CAD) subject to change, tax not included
    </div>
  </footer>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer__header">
      <h2 class="cart-drawer__title">Your Order</h2>
      <button class="cart-drawer__close" id="cart-close" aria-label="Close cart">×</button>
    </div>
    <div class="cart-drawer__items" id="cart-items">
      <div class="cart-drawer__empty">
        <div class="cart-drawer__empty-icon">🛒</div>
        <p>Your cart is empty</p>
        <p style="font-size:12px;margin-top:8px;">Browse the menu and add items</p>
      </div>
    </div>
    <div class="cart-drawer__footer">
      <div class="cart-drawer__total">
        <span class="cart-drawer__total-label">Subtotal</span>
        <span class="cart-drawer__total-amount" id="cart-total-amount">$0.00</span>
      </div>
      <p class="cart-drawer__tax-note">Tax not included · 未含稅</p>
      <button class="cart-drawer__checkout" id="cart-checkout-btn" disabled>Place Order</button>
      <button class="cart-drawer__whatsapp" id="cart-whatsapp">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Send via WhatsApp
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- App Script -->
  <script src="app.js"></script>

</body>
</html>
